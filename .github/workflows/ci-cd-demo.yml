name: CI/CD Data Ingestion Demo

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (syntax check)
        run: python -m compileall app tests

      - name: Run tests
        run: python -m pytest -q

      - name: Build artifact
        run: |
          mkdir -p dist
          cp -r app dist/app
          echo "build_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ingestion-build
          path: dist/

  deploy_staging:
    name: Deploy to Staging (demo)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Simulate staging deploy
        run: echo "Deploying demo artifact to staging..."

  deploy_production:
    name: Deploy to Production (manual approval)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Simulate production deploy
        run: 'echo "Manual run approved: deploying to production."'
